<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limpieza</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 50px auto;
            padding: 40px;
            font-size: 18px;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 30px;
        }
        .months-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        .month-button {
            padding: 20px;
            font-size: 18px;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .month-button:hover {
            opacity: 0.8;
        }
        .month-button.green {
            background: #90EE90;
        }
        .month-button.blue {
            background: #87CEEB;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            font-size: 18px;
        }
        th, td {
            border: 2px solid #ddd;
            padding: 15px;
            text-align: center;
        }
        th {
            background-color: #87CEEB;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .weekend-col {
            background-color: #90EE90;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Limpieza</h1>
    
    <div class="months-container" id="monthsContainer"></div>
    
    <div id="result"></div>

    <script>
        const rooms = {
            'W': 'Willdave',
            'B': 'Belkis',
            'A': 'Anderly',
            'T': 'Tural',
            'J': 'Jennifer'
        };

        const rotationPattern = [
            {Baño: 'A', Sala: 'J', Cocina: 'W', Lavanderia: 'B', Nada: 'T'},
            {Baño: 'T', Sala: 'A', Cocina: 'J', Lavanderia: 'W', Nada: 'B'},
            {Baño: 'B', Sala: 'T', Cocina: 'A', Lavanderia: 'J', Nada: 'W'},
            {Baño: 'W', Sala: 'B', Cocina: 'T', Lavanderia: 'A', Nada: 'J'},
            {Baño: 'J', Sala: 'W', Cocina: 'B', Lavanderia: 'T', Nada: 'A'}
        ];

        // Start date: Friday Jan 16, 2026
        const startDate = new Date(2026, 0, 16);

        const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio',
            'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

        // DST-safe week diff: uses UTC midnight to avoid hour-shift errors
        function diffInWeeks(friday) {
            const d1 = Date.UTC(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
            const d2 = Date.UTC(friday.getFullYear(), friday.getMonth(), friday.getDate());
            const diffDays = Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
            return Math.floor(diffDays / 7);
        }

        function renderMonths() {
            let html = '';
            // Only Jan 2026 through July 2026
            const months = [0,1,2,3,4,5,6]; // Jan=0 ... Jul=6
            months.forEach((month, i) => {
                const colorClass = i % 2 === 0 ? 'green' : 'blue';
                html += `<button class="month-button ${colorClass}" onclick="showMonth(2026, ${month})">${monthNames[month]} 2026</button>`;
            });
            document.getElementById('monthsContainer').innerHTML = html;
        }

        function getWeekends(year, month) {
            const weekends = [];

            // Fridays in this month
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                if (date.getDay() === 5) {
                    const friday = new Date(year, month, day);
                    const saturday = new Date(year, month, day + 1);
                    const sunday = new Date(year, month, day + 2);
                    const rotationIndex = ((diffInWeeks(friday) % 5) + 5) % 5;
                    weekends.push({
                        friday, saturday, sunday,
                        schedule: rotationPattern[rotationIndex]
                    });
                }
            }

            // Check if previous month's last Friday spills Sat/Sun into this month
            const prevMonth = month === 0 ? 11 : month - 1;
            const prevYear  = month === 0 ? year - 1 : year;
            const daysInPrev = new Date(prevYear, prevMonth + 1, 0).getDate();

            for (let day = Math.max(1, daysInPrev - 6); day <= daysInPrev; day++) {
                const date = new Date(prevYear, prevMonth, day);
                if (date.getDay() === 5) {
                    const friday   = new Date(prevYear, prevMonth, day);
                    const saturday = new Date(prevYear, prevMonth, day + 1);
                    const sunday   = new Date(prevYear, prevMonth, day + 2);
                    if (saturday.getMonth() === month || sunday.getMonth() === month) {
                        const rotationIndex = ((diffInWeeks(friday) % 5) + 5) % 5;
                        weekends.unshift({
                            friday, saturday, sunday,
                            schedule: rotationPattern[rotationIndex]
                        });
                    }
                }
            }

            return weekends;
        }

        function showMonth(year, month) {
            const weekends = getWeekends(year, month);

            let html = '<table>';
            html += '<tr>';
            html += '<th class="weekend-col">Fin de Semana (V-D)</th>';
            html += '<th>Baño</th>';
            html += '<th>Sala</th>';
            html += '<th>Cocina</th>';
            html += '<th>Lavanderia</th>';
            html += '<th>Nada</th>';
            html += '</tr>';

            weekends.forEach(w => {
                html += '<tr>';
                html += `<td class="weekend-col">${fmt(w.friday)} al ${fmt(w.sunday)}</td>`;
                html += `<td>${rooms[w.schedule.Baño]}</td>`;
                html += `<td>${rooms[w.schedule.Sala]}</td>`;
                html += `<td>${rooms[w.schedule.Cocina]}</td>`;
                html += `<td>${rooms[w.schedule.Lavanderia]}</td>`;
                html += `<td>${rooms[w.schedule.Nada] || ''}</td>`;
                html += '</tr>';
            });

            html += '</table>';
            document.getElementById('result').innerHTML = html;
            document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function fmt(date) {
            const d = String(date.getDate()).padStart(2, '0');
            const m = String(date.getMonth() + 1).padStart(2, '0');
            return `${d}/${m}`;
        }

        renderMonths();
    </script>
</body>
</html>
